<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS Simulator - Login</title>
    <link rel="stylesheet" href="css/login.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-desktop"></i>
                    <h1>OS Simulator</h1>
                </div>
                <p class="subtitle">Please sign in to continue</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In
                </button>
            </form>
            
            <div class="login-footer">
                <div class="demo-accounts">
                    <h4>Demo Accounts:</h4>
                    <div class="account-list">
                        <div class="account-item">
                            <strong>Admin:</strong> admin / admin123
                        </div>
                        <div class="account-item">
                            <strong>User:</strong> user / user123
                        </div>
                    </div>
                </div>
                
                <button class="create-account-btn" id="createAccountBtn">
                    <i class="fas fa-user-plus"></i>
                    Create New Account
                </button>
            </div>
        </div>
        
        <div class="background-animation">
            <div class="floating-shapes">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
                <div class="shape shape-3"></div>
                <div class="shape shape-4"></div>
                <div class="shape shape-5"></div>
            </div>
        </div>
    </div>
    
    <!-- Create Account Modal -->
    <div id="createAccountModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create New Account</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <form id="createAccountForm">
                    <div class="form-group">
                        <label for="newUsername">
                            <i class="fas fa-user"></i>
                            Username
                        </label>
                        <input type="text" id="newUsername" name="username" required minlength="3">
                        <small>Minimum 3 characters</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="newPassword">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <input type="password" id="newPassword" name="password" required minlength="6">
                        <small>Minimum 6 characters</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">
                            <i class="fas fa-lock"></i>
                            Confirm Password
                        </label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelCreateBtn">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="submitCreateBtn">
                            <i class="fas fa-user-plus"></i>
                            Create Account
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Signing in...</p>
        </div>
    </div>
    
    <script src="js/login.js"></script>
</body>
</html>
