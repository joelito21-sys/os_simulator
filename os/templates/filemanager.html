<div class="file-manager">
    <div class="file-manager-toolbar">
        <div class="toolbar-group">
            <button class="btn" id="backBtn" title="Back"><i class="fas fa-arrow-left"></i></button>
            <button class="btn" id="upBtn" title="Up"><i class="fas fa-arrow-up"></i></button>
            <button class="btn" id="refreshBtn" title="Refresh"><i class="fas fa-sync"></i></button>
        </div>
        <div class="toolbar-group" style="flex:1">
            <input type="text" class="path-input" id="pathInput" readonly>
        </div>
        <div class="toolbar-group">
            <button class="btn" id="newFolderBtn"><i class="fas fa-folder-plus"></i> New Folder</button>
            <button class="btn" id="newFileBtn"><i class="fas fa-file-medical"></i> New File</button>
        </div>
    </div>
    <div class="file-manager-content">
        <div class="file-list" id="fileList"></div>
    </div>
</div>
